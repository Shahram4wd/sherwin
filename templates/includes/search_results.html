{% load images %}
{% if snaps %}
<div class="mb-4 flex items-center justify-between">
    <p class="text-sm text-gray-400">
        <span class="text-white font-medium">{{ snaps|length }}</span> result{{ snaps|length|pluralize }} for "<span class="text-accent-400">{{ query }}</span>"
    </p>
</div>
{% include "snaps/includes/snap_cards.html" %}
{% else %}
<div class="text-center py-12">
    <svg class="w-12 h-12 mx-auto mb-3 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <p class="text-gray-400">No results found for "<span class="text-white">{{ query }}</span>"</p>
    <p class="text-gray-600 text-sm mt-1">Try a different search term</p>
</div>
{% endif %}
