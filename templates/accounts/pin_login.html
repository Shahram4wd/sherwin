{% extends "base.html" %}
{% block title %}Login - Sherwin Universe{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4" x-data="pinPad()">
    <div class="w-full max-w-xs text-center">
        <!-- Logo -->
        <div class="mb-8">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-accent-500 flex items-center justify-center shadow-lg shadow-accent-500/25 mb-4">
                <span class="text-white text-2xl font-display font-bold">S</span>
            </div>
            <h1 class="text-2xl font-display font-bold">Welcome back!</h1>
            <p class="text-gray-500 text-sm mt-1">Enter your PIN to continue</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 mb-6 text-red-400 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" x-ref="pinForm">
            {% csrf_token %}

            <!-- PIN dots display -->
            <div class="flex justify-center gap-3 mb-8">
                <template x-for="i in 6" :key="i">
                    <div class="w-4 h-4 rounded-full transition-all duration-200"
                         :class="pin.length >= i ? 'bg-accent-500 scale-110' : 'bg-white/10'"></div>
                </template>
            </div>

            <input type="hidden" name="pin" :value="pin">

            <!-- Number pad -->
            <div class="grid grid-cols-3 gap-3 max-w-[240px] mx-auto">
                <template x-for="n in [1,2,3,4,5,6,7,8,9]" :key="n">
                    <button type="button"
                            @click="addDigit(n)"
                            class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 text-white text-xl font-semibold hover:bg-white/10 hover:border-accent-400/20 active:scale-95 transition-all flex items-center justify-center">
                        <span x-text="n"></span>
                    </button>
                </template>
                <!-- Empty, 0, Delete -->
                <div></div>
                <button type="button"
                        @click="addDigit(0)"
                        class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 text-white text-xl font-semibold hover:bg-white/10 hover:border-accent-400/20 active:scale-95 transition-all flex items-center justify-center">
                    0
                </button>
                <button type="button"
                        @click="removeDigit()"
                        class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 text-gray-400 hover:text-accent-400 hover:bg-white/10 active:scale-95 transition-all flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l7-7 4 0 7 7-7 7-4 0z"/></svg>
                </button>
            </div>

            <!-- Submit -->
            <button type="submit"
                    :disabled="pin.length < 4"
                    :class="pin.length >= 4 ? 'bg-accent-500 hover:bg-accent-600 shadow-lg shadow-accent-500/25' : 'bg-gray-700 cursor-not-allowed'"
                    class="w-full mt-6 py-3 rounded-xl text-white font-semibold transition-all">
                Enter
            </button>
        </form>

        <p class="text-gray-600 text-xs mt-6">
            Parent? <a href="{% url 'admin:index' %}" class="text-accent-400 hover:underline">Admin login</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function pinPad() {
    return {
        pin: '',
        addDigit(n) {
            if (this.pin.length < 6) this.pin += n;
        },
        removeDigit() {
            this.pin = this.pin.slice(0, -1);
        }
    };
}
</script>
{% endblock %}
