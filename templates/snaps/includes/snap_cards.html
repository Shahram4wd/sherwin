<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    {% for snap in snaps %}
    <a href="{% url 'snaps:snap_detail' slug=snap.slug %}" class="glass-card rounded-2xl overflow-hidden group">
        {% if snap.featured_image %}
        <div class="aspect-square overflow-hidden">
            <img src="{{ snap.featured_image.url }}" alt="{{ snap.body|truncatewords:5 }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy">
        </div>
        {% endif %}
        <div class="p-4">
            {% if snap.body %}
            <p class="text-gray-300 text-sm line-clamp-2 mb-2">{{ snap.body|truncatewords:20 }}</p>
            {% endif %}
            <div class="flex items-center justify-between">
                <div class="flex flex-wrap gap-1">
                    {% for tag in snap.tags.all %}
                    <span class="text-xs text-gray-500">#{{ tag.name }}</span>
                    {% endfor %}
                </div>
                <time class="text-xs text-gray-600" datetime="{{ snap.published_at|date:'c' }}">{{ snap.published_at|timesince }} ago</time>
            </div>
        </div>
    </a>
    {% endfor %}
</div>

{% if snaps.has_next %}
<div hx-get="?page={{ snaps.next_page_number }}{% if current_tag %}&tag={{ current_tag }}{% endif %}"
     hx-trigger="revealed"
     hx-swap="afterend"
     class="flex justify-center py-8">
    <div class="w-6 h-6 border-2 border-accent-400/40 border-t-accent-400 rounded-full animate-spin"></div>
</div>
{% endif %}
