{% extends "base.html" %}

{% block title %}404 — Sherwin Universe{% endblock %}

{% block content %}
<section class="relative min-h-[70vh] flex items-center justify-center">
    <div class="absolute top-1/3 -left-32 w-72 h-72 bg-accent-500/5 rounded-full blur-[100px]"></div>
    <div class="text-center px-6">
        <p class="text-accent-400 text-xs font-medium tracking-[0.3em] uppercase mb-4">Lost in Space</p>
        <h1 class="text-8xl md:text-9xl font-display font-bold text-white mb-4">404</h1>
        <p class="text-gray-400 text-lg mb-8 max-w-md mx-auto">This corner of the universe hasn't been discovered yet.</p>
        <a href="/" class="inline-flex items-center space-x-2 px-6 py-3 rounded-full border border-white/20 text-white hover:border-accent-400/50 hover:bg-white/5 transition-all text-sm">
            <span>Return Home</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
        </a>
    </div>
</section>
{% endblock %}
