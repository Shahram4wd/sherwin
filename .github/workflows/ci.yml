name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: |
          pytest --ignore=tests/e2e --cov=apps --cov-report=term-missing --cov-fail-under=60

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: false  # E2E tests require a running Docker stack — run locally or enable manually

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Start Docker stack
        run: docker compose up -d
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8088/ && break || sleep 2
          done

      - name: Run E2E tests
        run: pytest tests/e2e --cov=tests/e2e

      - name: Tear down Docker stack
        if: always()
        run: docker compose down
